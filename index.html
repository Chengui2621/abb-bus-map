<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>ABB班车线路查询系统</title>
    <link rel="stylesheet" href="https://cache.amap.com/lbs/static/main1119.css"/>
    <script src="https://webapi.amap.com/maps?v=2.0&key=2934135c2c94f38359572ca4f5be03e9&plugin=AMap.Geocoder,AMap.Scale,AMap.ToolBar,AMap.LabelsLayer"></script>
    <style>

            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

            display: none;
            position: fixed;

            transition: transform 0.3s ease;

        .mobile-panel.collapsed {
            transform: translateY(calc(100% - 60px));

        .mobile-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px 20px 0 0;
            cursor: pointer;
        }
        .mobile-panel-title {
            font-size: 16px;
            font-weight: bold;
        }
        .mobile-panel-toggle {
            font-size: 20px;
            transition: transform 0.3s;
        }
        .mobile-panel.collapsed .mobile-panel-toggle {
            transform: rotate(180deg);
        }
        .mobile-panel-content {
            max-height: calc(70vh - 60px);
            overflow-y: auto;
            padding: 15px;
        }
        
        /* 折叠区域 */
        .accordion-section {
            margin-bottom: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }
        .accordion-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            background: #f8f9fa;
            cursor: pointer;
            font-weight: bold;
            color: #333;
        }
        .accordion-header.active {
            background: #667eea;
            color: white;
        }
        .accordion-icon {
            transition: transform 0.3s;
        }
        .accordion-header.active .accordion-icon {
            transform: rotate(180deg);
        }
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .accordion-content.expanded {
            max-height: 50vh;
            overflow-y: auto;
        }
        
        /* 线路列表 */
        .route-list-mobile {
            padding: 10px;
        }
        .route-card-mobile {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;

            margin-bottom: 8px;

            transition: all 0.3s;
        }
        .route-card-mobile:active {
            background: #f0f0f0;
        }
        .route-card-mobile.active {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .route-name-mobile {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .route-info-mobile {
            font-size: 12px;
            color: #666;
        }
        .route-type {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            margin-right: 5px;
        }
        .type-a { background: #ffebee; color: #c62828; }
        .type-b { background: #e3f2fd; color: #1565c0; }
        .type-other { background: #e8f5e9; color: #2e7d32; }
        
        /* 站点列表 */
        .stop-list-mobile {
            padding: 10px;
        }
        .stop-item-mobile {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }
        .stop-item-mobile:last-child {

        .stop-number-mobile {
            width: 24px;
            height: 24px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;

        .stop-name-mobile {

</head>
<body>
    <div class="progress-bar" id="progressBar"></div>
    
    <!-- 桌面端布局 -->
    <div class="container">
        <div class="sidebar">
            <div class="header">
                <h1>ABB班车线路查询</h1>
                <p>日常班车运行时刻表 - 2026年3月</p>
            </div>
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="stat-value" id="totalRoutes">0</div>
                    <div class="stat-label">线路总数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalStops">0</div>
                    <div class="stat-label">站点总数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="geoCoded">0</div>
                    <div class="stat-label">已定位</div>
                </div>
            </div>
            <div class="search-section">
                <input type="text" class="search-box" id="searchBox" placeholder="搜索线路或站点名称...">
                <div class="filter-tabs">
                    <button class="filter-tab active" data-filter="all">全部</button>
                    <button class="filter-tab" data-filter="A">A线</button>
                    <button class="filter-tab" data-filter="B">B线</button>
                </div>
            </div>
            <div class="route-list" id="routeList">
                <div class="loading">正在加载数据...</div>
            </div>
        </div>
        
        <div class="main-content">
            <div id="map"></div>
            <button class="geocode-btn" id="geocodeBtn" onclick="startGeocoding()">获取站点坐标</button>
            
            <div class="route-path-info" id="routePathInfo">
                <h4 id="pathTitle">线路走向</h4>
                <div class="path-stop-list" id="pathStopList"></div>
            </div>
            
            <div class="detail-panel" id="detailPanel">
                <div class="detail-header">
                    <button class="close-btn" onclick="closeDetail()">&times;</button>
                    <h2 id="detailTitle">线路详情</h2>
                    <p id="detailSubtitle">点击站点在地图上定位</p>
                </div>
                <div class="detail-content" id="detailContent">
                </div>
            </div>
            
            <div class="legend">
                <h4>线路类型</h4>
                <div class="legend-item">
                    <div class="legend-dot" style="background: #FF5722;"></div>
                    <span>A线 (上班)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: #2196F3;"></div>
                    <span>B线 (上班)</span>
                </div>
            </div>
            
            <div class="map-hint" id="mapHint">
                <p>👈 点击左侧线路查看详情</p>
            </div>
        </div>
    </div>
    
    <!-- 移动端底部面板 -->
    <div class="mobile-panel collapsed" id="mobilePanel">
        <div class="mobile-panel-header" onclick="toggleMobilePanel()">
            <span class="mobile-panel-title" id="mobilePanelTitle">选择线路</span>
            <span class="mobile-panel-toggle">▼</span>
        </div>
        <div class="mobile-panel-content">
            <!-- 搜索和筛选 -->
            <input type="text" class="search-box-mobile" id="searchBoxMobile" placeholder="搜索线路或站点...">
            <div class="filter-tabs-mobile">
                <button class="filter-tab-mobile active" data-filter="all" onclick="setMobileFilter('all')">全部</button>
                <button class="filter-tab-mobile" data-filter="A" onclick="setMobileFilter('A')">A线</button>
                <button class="filter-tab-mobile" data-filter="B" onclick="setMobileFilter('B')">B线</button>
            </div>
            
            <!-- 线路列表折叠区 -->
            <div class="accordion-section">
                <div class="accordion-header" id="routeAccordionHeader" onclick="toggleAccordion('route')">
                    <span>📋 线路列表 (<span id="routeCount">0</span>)</span>
                    <span class="accordion-icon">▼</span>
                </div>
                <div class="accordion-content" id="routeAccordionContent">
                    <div class="route-list-mobile" id="routeListMobile">
                        <div class="loading">正在加载...</div>
                    </div>
                </div>
            </div>
            
            <!-- 站点列表折叠区 -->
            <div class="accordion-section">
                <div class="accordion-header" id="stopAccordionHeader" onclick="toggleAccordion('stop')">
                    <span>📍 站点列表</span>
                    <span class="accordion-icon">▼</span>
                </div>
                <div class="accordion-content" id="stopAccordionContent">
                    <div class="stop-list-mobile" id="stopListMobile">
                        <div class="empty-state" style="padding: 20px; color: #999; text-align: center;">
                            请先选择一条线路
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let map;
        let routesData = [];
        let currentLayers = [];
        let currentFilter = 'all';
        let mobileFilter = 'all';
        let geocoder;
        let stopCoordinates = {};
        let labelsLayer;
        let currentRouteIndex = null;
        let isMobile = window.innerWidth <= 768;
        
        // 监听窗口大小变化
        window.addEventListener('resize', () => {
            isMobile = window.innerWidth <= 768;
        });

        // 百度坐标(BD09)转高德坐标(GCJ02)
        function bd09togcj02(bd_lon, bd_lat) {
            const x_pi = 3.14159265358979324 * 3000.0 / 180.0;
            const x = bd_lon - 0.0065;
            const y = bd_lat - 0.006;
            const z = Math.sqrt(x * x + y * y) - 0.00002 * Math.sin(y * x_pi);
            const theta = Math.atan2(y, x) - 0.000003 * Math.cos(x * x_pi);
            const gg_lng = z * Math.cos(theta);
            const gg_lat = z * Math.sin(theta);
            return [gg_lng, gg_lat];
        }

        // 转换站点坐标
        function convertStopCoordinates(stop) {
            if (stop.lng && stop.lat) {
                const converted = bd09togcj02(stop.lng, stop.lat);
                return {
                    ...stop,
                    lng: converted[0],
                    lat: converted[1]
                };
            }
            return stop;
        }

        function initMap() {
            map = new AMap.Map('map', {
                zoom: 11,
                center: [118.0894, 24.4798],
                viewMode: '2D'
            });
            
            map.addControl(new AMap.Scale());
            map.addControl(new AMap.ToolBar());
            
            labelsLayer = new AMap.LabelsLayer({
                zooms: [3, 20],
                zIndex: 1000
            });
            map.add(labelsLayer);
            
            geocoder = new AMap.Geocoder({
                city: '厦门'
            });
        }

        // 加载数据并转换坐标
        fetch('routes_data.json?v=' + new Date().getTime())
            .then(response => response.json())
            .then(data => {
                // 转换所有站点的百度坐标为高德坐标
                routesData = data.map(route => ({
                    ...route,
                    stops: route.stops.map(convertStopCoordinates)
                }));
                updateStats();
                renderRouteList();
                renderMobileRouteList();
                checkGeocodedStops();
                console.log('坐标转换完成：百度BD09 -> 高德GCJ02');
            })
            .catch(error => {
                console.error('Error loading routes:', error);
                document.getElementById('routeList').innerHTML = `
                    <div class="empty-state">
                        <p>加载数据失败，请刷新页面重试</p>
                    </div>
                `;
                document.getElementById('routeListMobile').innerHTML = `
                    <div class="empty-state">加载失败</div>
                `;
            });

        function checkGeocodedStops() {
            let count = 0;
            routesData.forEach(route => {
                route.stops.forEach(stop => {
                    if (stop.lat && stop.lng) {
                        count++;
                        stopCoordinates[stop.name] = [stop.lng, stop.lat];
                    }
                });
            });
            document.getElementById('geoCoded').textContent = count;
            if (count > 0) {
                document.getElementById('geocodeBtn').textContent = '已获取 ' + count + ' 个坐标';
            }
        }

        function updateStats() {
            document.getElementById('totalRoutes').textContent = routesData.length;
            document.getElementById('routeCount').textContent = routesData.length;
            const totalStops = routesData.reduce((sum, route) => sum + route.stops.length, 0);
            document.getElementById('totalStops').textContent = totalStops;
        }

        function getRouteType(routeName) {
            if (routeName.includes('A')) return 'A';
            if (routeName.includes('B')) return 'B';
            return 'other';
        }

        function getRouteColor(routeType) {
            if (routeType === 'A') return '#FF5722';
            if (routeType === 'B') return '#2196F3';
            return '#4CAF50';
        }

        // 桌面端渲染线路列表
        function renderRouteList() {
            const list = document.getElementById('routeList');
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            
            let filteredRoutes = routesData;
            
            if (currentFilter !== 'all') {
                filteredRoutes = filteredRoutes.filter(r => getRouteType(r.name) === currentFilter);
            }
            
            if (searchTerm) {
                filteredRoutes = filteredRoutes.filter(r => 
                    r.name.toLowerCase().includes(searchTerm) ||
                    r.stops.some(s => s.name.toLowerCase().includes(searchTerm))
                );
            }
            
            if (filteredRoutes.length === 0) {
                list.innerHTML = `<div class="empty-state"><p>没有找到匹配的线路</p></div>`;
                return;
            }
            
            list.innerHTML = filteredRoutes.map((route) => {
                const type = getRouteType(route.name);
                const typeClass = type === 'A' ? 'type-a' : type === 'B' ? 'type-b' : 'type-other';
                const typeLabel = type === 'A' ? 'A线' : type === 'B' ? 'B线' : '其他';
                const firstStop = route.stops[0];
                const lastStop = route.stops[route.stops.length - 1];
                const routeIndex = routesData.indexOf(route);
                
                return `
                    <div class="route-card" data-index="${routeIndex}" onclick="showRouteDetail(${routeIndex})">
                        <div class="route-name">
                            <span class="route-type ${typeClass}">${typeLabel}</span>
                            ${route.name}
                        </div>
                        <div class="route-info">
                            ${route.stops.length}个站点 · 
                            ${firstStop ? firstStop.time : ''} 发车 · 
                            终点: ${lastStop ? lastStop.name : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 移动端渲染线路列表
        function renderMobileRouteList() {
            const list = document.getElementById('routeListMobile');
            const searchTerm = document.getElementById('searchBoxMobile').value.toLowerCase();
            
            let filteredRoutes = routesData;
            
            if (mobileFilter !== 'all') {
                filteredRoutes = filteredRoutes.filter(r => getRouteType(r.name) === mobileFilter);
            }
            
            if (searchTerm) {
                filteredRoutes = filteredRoutes.filter(r => 
                    r.name.toLowerCase().includes(searchTerm) ||
                    r.stops.some(s => s.name.toLowerCase().includes(searchTerm))
                );
            }
            
            if (filteredRoutes.length === 0) {
                list.innerHTML = `<div class="empty-state">没有找到匹配的线路</div>`;
                return;
            }
            
            list.innerHTML = filteredRoutes.map((route) => {
                const type = getRouteType(route.name);
                const typeClass = type === 'A' ? 'type-a' : type === 'B' ? 'type-b' : 'type-other';
                const typeLabel = type === 'A' ? 'A线' : type === 'B' ? 'B线' : '其他';
                const firstStop = route.stops[0];
                const lastStop = route.stops[route.stops.length - 1];
                const routeIndex = routesData.indexOf(route);
                
                return `
                    <div class="route-card-mobile ${currentRouteIndex === routeIndex ? 'active' : ''}" 
                         data-index="${routeIndex}" 
                         onclick="selectMobileRoute(${routeIndex})">
                        <div class="route-name-mobile">
                            <span class="route-type ${typeClass}">${typeLabel}</span>
                            ${route.name}
                        </div>
                        <div class="route-info-mobile">
                            ${route.stops.length}个站点 · ${firstStop ? firstStop.time : ''}发车
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 移动端选择线路
        function selectMobileRoute(index) {
            if (currentRouteIndex === index) return;
            currentRouteIndex = index;
            
            const route = routesData[index];
            const type = getRouteType(route.name);
            const color = getRouteColor(type);
            
            // 更新标题
            document.getElementById('mobilePanelTitle').textContent = route.name;
            
            // 更新线路列表样式
            renderMobileRouteList();
            
            // 渲染站点列表
            renderMobileStopList(route, color);
            
            // 展开站点列表
            document.getElementById('stopAccordionContent').classList.add('expanded');
            document.getElementById('stopAccordionHeader').classList.add('active');
            
            // 折叠线路列表
            document.getElementById('routeAccordionContent').classList.remove('expanded');
            document.getElementById('routeAccordionHeader').classList.remove('active');
            
            // 折叠面板
            document.getElementById('mobilePanel').classList.add('collapsed');
            
            // 显示地图
            clearMap();
            document.getElementById('mapHint').classList.add('hidden');
            
            // 绘制线路
            const path = [];
            route.stops.forEach((stop, i) => {
                const coord = stopCoordinates[stop.name] || (stop.lng && stop.lat ? [stop.lng, stop.lat] : null);
                if (coord) {
                    path.push(coord);
                    
                    // 绘制站点标记
                    const glowCircle = new AMap.CircleMarker({
                        center: coord,
                        radius: 18,
                        fillColor: color,
                        strokeColor: color,
                        strokeWeight: 0,
                        fillOpacity: 0.3
                    });
                    glowCircle.setMap(map);
                    
                    const marker = new AMap.CircleMarker({
                        center: coord,
                        radius: 10,
                        fillColor: color,
                        strokeColor: '#fff',
                        strokeWeight: 3,
                        fillOpacity: 1
                    });
                    marker.setMap(map);
                    
                    currentLayers.push(glowCircle, marker);
                }
            });
            
            // 绘制线路
            if (path.length > 1) {
                const polyline = new AMap.Polyline({
                    path: path,
                    strokeColor: color,
                    strokeWeight: 6,
                    strokeOpacity: 1,
                    showDir: true
                });
                polyline.setMap(map);
                currentLayers.push(polyline);
                
                map.setFitView(currentLayers, true, [50, 50, 50, 50]);
            }
        }

        // 移动端渲染站点列表
        function renderMobileStopList(route, color) {
            const list = document.getElementById('stopListMobile');
            const routeIndex = routesData.indexOf(route);
            
            list.innerHTML = route.stops.map((stop, i) => {
                const hasCoord = stopCoordinates[stop.name] || (stop.lat && stop.lng);
                return `
                    <div class="stop-item-mobile" onclick="locateMobileStop(${routeIndex}, ${i}, '${color}')">
                        <div class="stop-number-mobile">${i + 1}</div>
                        <div class="stop-info-mobile">
                            <div class="stop-name-mobile">${stop.name} ${hasCoord ? '📍' : ''}</div>
                            <div class="stop-time-mobile">${stop.time || '--:--'} · ${stop.location}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 移动端定位站点
        function locateMobileStop(routeIndex, stopIndex, color) {
            const route = routesData[routeIndex];
            const stop = route.stops[stopIndex];
            
            let coord = null;
            if (stop.lng && stop.lat) {
                coord = [stop.lng, stop.lat];
            } else if (stopCoordinates[stop.name]) {
                coord = stopCoordinates[stop.name];
            }
            
            if (coord) {
                map.setCenter(coord);
                map.setZoom(17);
                
                // 折叠面板
                document.getElementById('mobilePanel').classList.add('collapsed');
                
                // 显示信息窗
                const infoWindow = new AMap.InfoWindow({
                    content: `
                        <div style="padding: 10px; min-width: 150px;">
                            <h4 style="margin: 0 0 5px 0; color: ${color};">${stop.name}</h4>
                            <p style="margin: 0; font-size: 12px; color: #666;">时间: ${stop.time || '未知'}</p>
                            <p style="margin: 5px 0 0 0; font-size: 11px; color: #999;">${stop.location}</p>
                        </div>
                    `,
                    offset: new AMap.Pixel(0, -20)
                });
                infoWindow.open(map, coord);
            } else {
                alert('该站点暂无坐标信息');
            }
        }

        // 移动端折叠/展开面板
        function toggleMobilePanel() {
            const panel = document.getElementById('mobilePanel');
            panel.classList.toggle('collapsed');
        }

        // 移动端折叠/展开手风琴
        function toggleAccordion(type) {
            const content = document.getElementById(type + 'AccordionContent');
            const header = document.getElementById(type + 'AccordionHeader');
            
            content.classList.toggle('expanded');
            header.classList.toggle('active');
        }

        // 移动端筛选
        function setMobileFilter(filter) {
            mobileFilter = filter;
            document.querySelectorAll('.filter-tab-mobile').forEach(tab => {
                tab.classList.remove('active');
                if (tab.dataset.filter === filter) {
                    tab.classList.add('active');
                }
            });
            renderMobileRouteList();
        }

        // 桌面端显示线路详情
        function showRouteDetail(index) {
            if (currentRouteIndex === index) return;
            currentRouteIndex = index;
            
            const route = routesData[index];
            const type = getRouteType(route.name);
            const color = getRouteColor(type);
            
            document.querySelectorAll('.route-card').forEach(card => card.classList.remove('active'));
            document.querySelector(`.route-card[data-index="${index}"]`)?.classList.add('active');
            
            document.getElementById('detailTitle').textContent = route.name;
            document.getElementById('detailTitle').style.color = color;
            document.getElementById('detailSubtitle').textContent = `${route.stops.length}个站点 · 点击站点在地图上定位`;
            
            const content = document.getElementById('detailContent');
            content.innerHTML = route.stops.map((stop, i) => {
                const hasCoord = stopCoordinates[stop.name] || (stop.lat && stop.lng);
                return `
                    <div class="stop-item" onclick="locateStop('${stop.name}', ${index}, ${i})">
                        <div class="stop-number">${i + 1}</div>
                        <div class="stop-info">
                            <div class="stop-name">${stop.name} ${hasCoord ? '📍' : ''}</div>
                            <div class="stop-time">${stop.time || '--:--'}</div>
                            <div class="stop-location">${stop.location}</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('detailPanel').classList.add('show');
            
            clearMap();
            document.getElementById('mapHint').classList.add('hidden');
            
            const path = [];
            route.stops.forEach((stop, i) => {
                const coord = stopCoordinates[stop.name] || (stop.lng && stop.lat ? [stop.lng, stop.lat] : null);
                if (coord) {
                    path.push(coord);
                    
                    const glowCircle = new AMap.CircleMarker({
                        center: coord,
                        radius: 18,
                        fillColor: color,
                        strokeColor: color,
                        strokeWeight: 0,
                        fillOpacity: 0.3
                    });
                    glowCircle.setMap(map);
                    
                    const marker = new AMap.CircleMarker({
                        center: coord,
                        radius: 10,
                        fillColor: color,
                        strokeColor: '#fff',
                        strokeWeight: 3,
                        fillOpacity: 1
                    });
                    marker.setMap(map);
                    
                    currentLayers.push(glowCircle, marker);
                }
            });
            
            if (path.length > 1) {
                const polyline = new AMap.Polyline({
                    path: path,
                    strokeColor: color,
                    strokeWeight: 6,
                    strokeOpacity: 1,
                    showDir: true
                });
                polyline.setMap(map);
                currentLayers.push(polyline);
                
                map.setFitView(currentLayers, true, [80, 80, 80, 80]);
            }
        }

        // 桌面端定位站点
        function locateStop(stopName, routeIndex, stopIndex) {
            const route = routesData[routeIndex];
            const stop = route.stops[stopIndex];
            let coord = null;
            
            if (stop.lng && stop.lat) {
                coord = [stop.lng, stop.lat];
            } else if (stopCoordinates[stop.name]) {
                coord = stopCoordinates[stop.name];
            }
            
            if (coord) {
                map.setCenter(coord);
                map.setZoom(17);
                
                const type = getRouteType(route.name);
                const color = getRouteColor(type);
                
                const infoWindow = new AMap.InfoWindow({
                    content: `
                        <div style="padding: 15px; min-width: 200px;">
                            <h4 style="margin: 0 0 10px 0; color: ${color};">${stop.name}</h4>
                            <p style="margin: 5px 0; font-size: 14px;"><strong>时间:</strong> ${stop.time || '未知'}</p>
                            <p style="margin: 5px 0; font-size: 12px; color: #666;">${stop.location}</p>
                        </div>
                    `,
                    offset: new AMap.Pixel(0, -30)
                });
                infoWindow.open(map, coord);
            } else {
                alert('该站点暂无坐标信息');
            }
        }

        function closeDetail() {
            document.getElementById('detailPanel').classList.remove('show');
            document.querySelectorAll('.route-card').forEach(card => card.classList.remove('active'));
            clearMap();
            currentRouteIndex = null;
            document.getElementById('mapHint').classList.remove('hidden');
        }

        function clearMap() {
            currentLayers.forEach(layer => layer.setMap(null));
            currentLayers = [];
        }

        // 搜索监听
        document.getElementById('searchBox')?.addEventListener('input', renderRouteList);
        document.getElementById('searchBoxMobile')?.addEventListener('input', renderMobileRouteList);

        // 筛选监听
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                renderRouteList();
            });
        });

        // 初始化地图
        initMap();
    </script>
</body>
</html>
